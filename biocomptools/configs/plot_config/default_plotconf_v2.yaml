!define plotvars:
  base_range: &br [0.05, 0.7]
  xlims: *br
  ylims: *br
  zlims: *br
  vlims: *br
  cmap: bc_blues
  colors:
    grey: "#777777"
    red: "#FF0000"

rescaler: !include pkg:biocomptools:configs/data_config/rescaler/EBFP2_compressed_v2


rc_context:
  !include pkg:biocomptools:configs/plot_config/default_rcparams

callstack_params:
  heatmap_params:
    axtransform: null
    bad_color: "#EEEEEE00"
    cmap: ${plotvars['cmap']}
    contours: null
    opacities: null
    vlims: ${plotvars['vlims']}

  histogram_params:
    cmap: ${plotvars['cmap']}
    draw_colorbar: false
    nbins: [256, 256]
    noise_smooth: 0
    use_log_density: true
    vlims: ${plotvars['vlims']}

  knn_avg_params:
    avg_method: mean
    k: 700
    min_points: 20

  knn_grid_params:
    grid_resolution: 250
    is_density_plot: false

  mkfig_params:
    dpi: 300
    size: [30, 3]

  plot_network_params:
    density_quantile_threshold: 0.05
    input_order: null
    kde: null
    use_y_as_x: false
    method: smooth
    protein_aliases: null

  auto_plot_params:
    plot_method_per_input_dim:
      1: smooth
      2: smooth
      3: smooth

  smooth_1d_params:
    xlims: ${plotvars['xlims']}
    vlims: ${plotvars['vlims']}

  smooth_2d_params:
    draw_colorbar: true
    xlims: ${plotvars['xlims']}
    ylims: ${plotvars['ylims']}
    vlims: ${plotvars['vlims']}
    colorbar_params:
      size: [0.06, 0.85]
      position: [1.05, 0.075]
      tick_props:
        labelsize: 9
        pad: 3
        length: 4

  smooth_3d_params:
    smooth_2d_params:
      draw_colorbar: false
      heatmap_params:
        contours: 0
    xlims: ${plotvars['xlims']}
    ylims: ${plotvars['ylims']}
    zlims: ${plotvars['zlims']}
    vlims: ${plotvars['vlims']}
    zslices: [0.05, 0.25, 0.4, 0.55]
    draw_colorbar: null
    colorbar_position: [1.05, 0.4]
    colorbar_size: [0.045, 0.5]
    projection_angle: 45.0
    projection_diag_coef: 0.5
    xaxis_labelpad: 22
    yaxis_labelpad: 25
    zaxis_labelpad: 35
    cube_edge_props:
      bottom_left:
        offset: [0, 0]
        props:
          alpha: 0.5
          color: ${plotvars['colors']['grey']}
          linestyle: ":"
          linewidth: 0.5
          zorder: -2147483637
      bottom_right:
        labels:
          major:
            offset: [10, 0]
            props:
              bbox:
                alpha: 1
                edgecolor: none
                facecolor: white
                pad: -0.25
              fontsize: 8
              color: ${plotvars['colors']['grey']}
              ha: left
              va: center
          slice:
            offset: [85, 0]
            props:
              fontsize: 7
              color: ${plotvars['colors']['grey']}
              ha: left
              va: center
        offset: [0.0, 0]
        props:
          color: ${plotvars['colors']['grey']}
          linestyle: "-"
          linewidth: 0.5
          zorder: 2147483637
        ticks:
          major:
            [
              {
                direction: [1, 0, 0],
                length: 8,
                props:
                  { color: "${plotvars['colors']['grey']}", linewidth: 0.4 },
              },
            ]
          minor:
            [
              {
                direction: [1, 0, 0],
                length: 2,
                props:
                  { color: "${plotvars['colors']['grey']}", linewidth: 0.2 },
              },
            ]
          slice:
            [
              {
                direction: [1, 0, 0],
                length: 80,
                props:
                  {
                    color: "${plotvars['colors']['grey']}",
                    alpha: 0.5,
                    dashes: [5, 5],
                    linewidth: 0.2,
                  },
              },
            ]
        zaxis_title:
          offset: [60, 0]
          props:
            fontsize: 8
            rotation: 45
            ha: center
            va: center
            color: ${plotvars['colors']['grey']}
      top_left:
        offset: [0, 0]
        props:
          color: ${plotvars['colors']['grey']}
          linestyle: "-"
          linewidth: 0.5
          zorder: 2147483637
      top_right:
        offset: [0, 0]
        props:
          color: ${plotvars['colors']['grey']}
          linestyle: "-"
          linewidth: 0.5
          zorder: 2147483637
