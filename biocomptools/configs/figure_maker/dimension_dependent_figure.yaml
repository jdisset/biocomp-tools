# a figure maker that will produce different things depending on the data input dimensions.
# Should be called on a single plotdata (inside a ForEachData, for example)
_target_: SwitchFigure
condition: "${data: dimensions.input}" # or maybe we can avoid the 'this' and use ${data: dimensions.input}
cases:
  1: # if input is 1D we make a density plot (i.e. a fancier scatter plot)
    _target_: SingleFigure
    plot_method:
      _target_: biocomp.histogram
    plot_config:
      default_values:
        cmap: viridis

  2: # if input is 2D we make a smooth (gaussian averaged) heatmap
    _target_: SingleFigure

    figure_spec:
      output_file: "${ftask: data.0.metadata.title}_2dheatmap.png"
      extra_args:
        dpi: 400

    plot_tasks:
      - plot_method:
          func: biocomp.plotutils.smooth
          kwargs:
            plot_data: "${ftask: data.0}"
            ax: "${ptask: context.figure.flat_ax}"


  3: # in 3d, we produce 2 things: a sequence of frames going through the z-axis, and a single figure with 4 subplots at different z-slices
    _target_: MultiFigure
    figure_makers:
      # video: make 10 frames (each on its own figure) going through the z-axis
      - _target_: MultiFigure
        n_repeats: 30 # duplicates the below figure_maker 10 times
        figure_makers:
          _target_: SingleFigure # each repeat will produce a single figure
          figure_spec:
            output_file: "${ftask: data.0.metadata.title}_3Dframes/frame_${ftask: context.multifigure_index}.png"
          
          plot_tasks:
            - plot_method:
                func: biocomp.plotutils.smooth
                kwargs:
                  plot_data: "${ftask: data.0}"
                  ax: "${ptask: context.figure.flat_ax}"

          plot_config:
            callstack_params:
              smooth_3d_params:
                zslices:
                  [
                    "${func: numpy.interp, ${ptask: context.multifigure_index}, [0, ${func: numpy.subtract, ${ptask: context.multifigure_n_repeats}, 1}], [0.05, 0.6]}",
                  ]

                  # slices: make a single figure with 4 subplots in a row at different z-values
      - _target_: SingleFigure
        n_plot_tasks: 1

        plot_config:
          callstack_params:
            smooth_3d_params:
              #zslices: "${func: numpy.linspace, ${ptask: plot_config.general.zlims.0}, ${ptask: plot_config.general.zlims.1},  ${ptask: context.figure.n_axes}}"
              zslices: [0.05, 0.25, 0.4, 0.55]

        figure_spec:
          output_file: "${ftask: data.0.metadata.title}_slices.png"
          layout:
            _target_: biocomp.plotutils.SimpleLayout
            rows: 1
            cols: 4

        plot_tasks:
          - plot_method:
              func: biocomp.plotutils.smooth
              kwargs:
                plot_data: "${ftask: data.0}"
                ax: "${ptask: context.figure.flat_ax}" # all axes in the row.

