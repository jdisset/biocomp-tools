# plots the data and predictions from a network model side by side
#
# REQUIRED VARIABLES:
# - model
# - plot_data : the ground truth plot_data object

!Figure
!set_default output_dir: ./prediction_figures
!set_default file_prefix: ""

!noconstruct prediction_data:
  - !NetworkPrediction &pred
    predict_at: ${plot_data.x}
    ground_truth: ${plot_data.y}
    network_model:
      model: ${model}
      network: ${plot_data.metadata['network']}

plot_config: !include pkg:biocomptools:configs/plot_config/default_plotconf_v2

figure_spec:
  output_dir: ${output_dir}
  output_file: ${file_prefix + plot_data.metadata['file_stem'] + '_combined_pred.pdf'}
  title: ${plot_data.metadata['file_stem']}
  layout: !SimpleLayout
    cols: 2

plot_tasks:
  - !define D: ${plot_data}
    !define axnum: 0
    <<: !include pkg:biocomptools:configs/plots/tasks/auto
    <<{+<}:
      plot_method:
        kwargs:
          title: "Ground Truth"

  - !define D: ${construct(&pred).get_data_lazy()[0]}
    !define axnum: 1
    <<: !include pkg:biocomptools:configs/plots/tasks/auto

    # <<{+<}:
    #   plot_method:
    #     kwargs:
    #       title: "Predictions (mse: ${str(round(D.metadata['mse'], 4))})"
