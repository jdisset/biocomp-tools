!set_default axnum: null
!set_default nslices: 20
!set_default threshold: "otsu:0.9"
!set_default opacity: 0.35
!set_default zlims: [0, 0.65]
!set_default slices: ${linspace(zlims[0], zlims[1], int(nslices))}

plot_config:
  <<: !include pkg:biocomptools:configs/plot_config/default_plotconf_v2
  <<{+<}:
    callstack_params:
      smooth_3d_params:
        <<{+<}: !include pkg:biocomptools:configs/plot_config/cube_view_v1
        draw_colorbar: true
        smooth_2d_params:
          knn_grid_params:
            grid_resolution: 100
            knn_stats_params:
              density_power: 1
              weight_by_densities: false
              k: 100
              min_points: 5
              radius: 0.10
          heatmap_params:
            opacity: ${float(opacity)}
            contours:
              - ${threshold if isinstance(threshold, str) else float(threshold)}

plot_method:
  func: biocomp.plotutils.smooth
  kwargs:
    plot_data: ${D}
    zslices: ${[slices]}
    ax: ${FIG.flat_ax if axnum is None else FIG.flat_ax[axnum]}
    xtitle: ${get_pretty_axis_label(0, D)}
    ytitle: ${get_pretty_axis_label(1, D)}
    ztitle: ${get_pretty_axis_label(2, D)}
    vtitle: ${D.output_name}
