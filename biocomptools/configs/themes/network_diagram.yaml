!noconstruct theme_vars: &tvars
  fluo_colors: &fcolors
    red: { dark: "#840137", base: "#ef957d", light: "#ffe5de", bright: "#FF2C4944" }
    green: { dark: "#0e633a", base: "#6ccb83", light: "#efffdd", bright: "#0EFF7377" }
    blue: { dark: "#006394", base: "#6cafc3", light: "#f3fafd", bright: "#1AD5FF60" }
    yellow: { dark: "#9b6600", base: "#fad26d", light: "#fff888", bright: "#FFC83Caa" }
    ir: { dark: "#6c1772", base: "#df9ae4", light: "#ffe7f4", bright: "#FF82FCaa" }
    maroon: { dark: "#734727", base: "#d3a888", light: "#f4decd", bright: "#FF9853a0" }

  marker_colors: &marker_colors
    EYFPG5A: *fcolors@yellow
    EYFP: *fcolors@yellow
    NEONGREEN: *fcolors@green
    EGFP: *fcolors@green
    MNG: *fcolors@green
    MNEONGREEN: *fcolors@green
    EBFP: *fcolors@blue
    EBFP2: *fcolors@blue
    MKATE: *fcolors@red
    MKATE2: *fcolors@red
    MKO: *fcolors@red
    MKO2: *fcolors@red
    TDTOMATO: *fcolors@red
    IRFP720: *fcolors@ir
    IRFP: *fcolors@ir
    MMAROON: *fcolors@maroon
    MMAROON1: *fcolors@maroon

  ern_colors: &ern_colors
    CSY4: "#aaaaaa"
    CASE: "#cccccc"
    PGU: "#eeeeee"

  border_color: &border_color "#222"
  text_color: &text_color "#222"
  comp_connection_color: &comp_conn_color "#222"

!define theme: ${construct(&tvars)}

ComputeNode:
  min_dimensions: !Size { width: 18, height: 18 }
  style.corner_radius: 1.0e+6
  style.background_color: "#aaa"
  style.border_color: ${theme.comp_connection_color}
  style.border_width: 1
  style.margin: [10, 10, 10, 10]
  layout.align_items: center
  layout.justify_content: center
  Text:
    font_size: 7
    color: "#fff"
    vertical_align: middle
    align: center

TranscriptionNode:
  style.background_color: "#555"

TranslationNode:
  style.background_color: "#333"

InputNode:
  style.background_color: "#222"
  Text:
    color: "#fff"

BiasNode:
  style.background_color: "#bbb"
  Text:
    color: "#444"

ERNNode:
  min_dimensions: !Size { width: 70, height: 70 }
  max_dimensions: !Size { width: 70, height: 70 }
  style.background_color: "#eee"
  style.border_style: custom
  style.dash_sequence: [5, 5]
  style.border_width: 1
  TranslationNode:
    style.background_color: "#ee3350"
    offset: !Offset { reference_relative: [0, 0.9], relative: [0, -1] }
  TranscriptionNode:
    offset: !Offset { reference_relative: [0, 0.1] }
  Connection[style_class=tlconn]:
    color: "#ee3350"
    line_width: 1
    start_offset: !Offset { relative: [1, 0.5] }
    end_offset: !Offset { absolute: [15, 3] }
    curve_type.start_direction: right
    curve_type.end_direction: up
    curve_type.start_length: 5
    curve_type.end_length: 5
    curve_type.corner_radius: 10
    z_index: -1
    end_cap.stroke_color: "#ee3350"
    end_cap.stroke_width: 1
    end_cap.length: 8
  Connection[style_class=txconn]:
    color: ${theme.comp_connection_color}
    line_width: 1
    z_index: -1
    curve_type.start_mode: vector
    curve_type.end_mode: vector
    curve_type.start_vector: [15, 15]
    curve_type.end_vector: [-40, 0]
    start_offset: !Offset { relative: [0.9, 0.8] }
  Text[style_class=ern_name]:
    color: "#888"
    font_size: 8
    vertical_align: middle
    align: center
    offset: !Offset { reference_relative: [0.5, 0.1], relative: [-0.5, 0] }
    is_overlay: true

FluoNode:
  style.border_color: "#00000030"
  style.background_color: "#FFBB79"
  style.shadow: !Shadow { color: "#FF8006", blur_radius: 15, resolution: 0.01, z_index: 1 }

!each(e) ${theme.marker_colors.items()}:
  FluoNode[style_class=~${e[0]}]:
    style.background_color: ${e[1]['light']}
    style.shadow: !Shadow { color: "${e[1]['bright']}", blur_radius: 15, resolution: 0.01, z_index: 1 }
    Text:
      color: ${e[1]['dark']}
      font_size: 8
      vertical_align: middle
      align: center

  AggregationNode[style_class=~${e[0]}]:
    style.shadow: !Shadow { color: "${e[1]['bright']}", blur_radius: 12, resolution: 0.01, z_index: 1 }

  TUNode[style_class=~${e[0]}]:
    style.shadow: !Shadow { color: "${e[1]['bright']}", blur_radius: 15, resolution: 0.01 }
    Text:
      color: ${e[1]['dark']}
      font_size: 6
      vertical_align: middle
      align: center

  Text[style_class=tu_label_marker][style_class=~${e[0]}]:
    color: ${e[1]['dark']}

TUNode:
  min_dimensions: !Size { width: 15, height: 4 }
  max_dimensions: !Size { width: 15, height: 4 }
  style.background_color: "#111"
  style.border_width: 0
  style.margin: [0, 0, 0, 0]
  offset: !Offset {}
  Text:
    color: "#000000"
    vertical_align: middle
    align: right
    is_overlay: true
    offset: !Offset { reference_relative: [0, 0], absolute: [-10, 0], relative: [-1, -0.3] }
  Container[style_class=tu_label_container]:
    offset: !Offset { reference_relative: [0, 0], absolute: [-10, 0], relative: [-1, -0.3] }
    Text[style_class=tu_label_prefix]:
      color: "#000000"
      font_size: 6
      vertical_align: middle
    Text[style_class=tu_label_suffix]:
      color: "#000000"
      font_size: 6
      vertical_align: middle
    Text[style_class=tu_label_marker]:
      font_size: 6
      vertical_align: middle

AggregationNode[style_class=!collapsed]:
  style.background_color: "#FFFFFFAA"
  style.border_color: "#FFA068"
  style.border_width: 1.5
  style.padding: [12, 4, 12, 4]
  layout: !LayoutConstraints { direction: column, justify_content: space-around, gap: 5 }
  TUNode:
    is_overlay: false

AggregationNode[style_class=collapsed]:
  min_dimensions: !Size { width: 15, height: 4 }
  max_dimensions: !Size { width: 15, height: 4 }
  style.background_color: "#111"
  style.corner_radius: 2
  style.border_width: 0
  style.padding: [0, 0, 0, 0]

TUNode[style_class=hidden_source]:
  is_overlay: true
  min_dimensions: !Size { width: 0.1, height: 0.1 }
  max_dimensions: !Size { width: 0.1, height: 0.1 }
  style.background_color: "#00000000"
  style.border_width: 0
  style.shadow: null
  offset: !Offset { reference_relative: [0.5, 0.5] }

DeadEndNode:
  style.background_color: "#00000000"
  style.border_width: 0
  style.padding: [0, 0, 0, 0]
  Text:
    color: "#000000"
    font_size: 12
    vertical_align: middle
    align: center

InvNode:
  style.background_color: "#eee"
  style.border_color: "#111"
  Text:
    color: *text_color

!noconstruct _network_diagram_base: &nd_base
  layout.gap: 25
  layout.direction: row
  layout.align_items: center
  layout.justify_content: center

  Connection[style_class=comp-connection]:
    color: ${theme.comp_connection_color}
    line_width: 1
    start_offset: !Offset { reference_relative: [0.99, 0.5] }
    end_offset: !Offset { reference_relative: [0.0, 0.5], absolute: [0, 0] }
    curve_type: !SimpleBezierCurve
      start_mode: vector
      end_mode: vector
      start_vector: [20, 0]
      end_vector: [-15, 0]
    end_cap: !LineEndCircle
      fill_color: ${theme.comp_connection_color}
      stroke_width: 0
      radius: 1.5
      z-index: 10

  Connection[style_class=dst-deadend]:
    end_offset: !Offset { reference_relative: [0.5, 0.5] }

  Connection[style_class=dst-source]:
    end_offset: !Offset { reference_relative: [0.5, 0.5] }
    curve_type: !StraightCurve {}

  Container[style_class=layer]:
    layout.gap: 10
    layout.direction: column
    layout.align_items: center
    layout.justify_content: center

  Container[style_class=input_layer]:
    layout.gap: 15
    style.padding: [0, 0, 0, 40]

  Container[style_class=auto_layer]:
    style.padding: [0, 0, 0, 0]

  Container[style_class=output_layer]:
    style.padding: [0, 0, 0, 20]

  Container[style_class=main_layer]:
    layout.direction: column
    layout.align_items: center
    layout.justify_content: center
    style.margin: [0, 0, 0, 0]
    layout.gap: 20

  Text[style_class=layer_title]:
    color: "#777"
    font_size: 7

NetworkDiagram:
  <<: *nd_base

"[style_class=disabled]":
  opacity: 0.3
