# biocomp-specific tweaks on top of jeanplot's default theme.
# Marker/source coloring lives in default.yaml via the live-scope `swatch`
# helper; only schematic-layout details and biocomp-specific overrides
# belong here.

rules: !cascade:jstyle_fill
  SourceAnnotation:
    Text[style_class=axis_tag]:
      font_size: 14
      font_weight: bold
      color: "#222"
      offset: !Offset
        reference_relative: [0, 0.5]
        relative: [-1, -0.5]
        absolute: [-7, 0]

  ERN:
    AnchorComponent[style_class=ern-anchor-top]:
      offset: !Offset
        reference_relative: [0.75, 1]
        relative: [-0.5, 0]
        absolute: [0, 2]
      direction: [0, 1]
      min_segment: 20.0
    AnchorComponent[style_class=ern-anchor-bottom]:
      offset: !Offset
        reference_relative: [0.72, 0]
        relative: [-0.5, 0]
        absolute: [0, 0]

  ERN5pRecog:
    AnchorComponent[style_class=ern-recog-anchor-top]:
      offset: !Offset
        reference_relative: [0.5, 1]
        relative: [-0.5, 0]
        absolute: [0, 2]
      direction: [0, 1]
      min_segment: 15.0
    AnchorComponent[style_class=ern-recog-anchor-bottom]:
      offset: !Offset
        reference_relative: [0.5, -0.2]
        relative: [-0.5, 0]
        absolute: [0, 0]

  Connection:
    color: "#999"
    line_width: 1.25
    end_cap:
      stroke_color: "#999"
      stroke_width: 1.25
      length: 8.0
