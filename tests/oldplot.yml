figure_spec:
  title: null
  output_dir: /tmp
  output_file: simple_plot.png
  layout:
    _target_: biocomp.plotutils.SimpleLayout

plot_config:
  <<: *pkg:biocomptools:configs/plot_config/default_plotconf
  rescaler: *pkg:biocomptools:configs/data_config/rescaler/EBFP2_compressed
  general:
    vlims: [null, null]
  rc_context:
    figure.subplot.hspace: 0.38
    figure.subplot.wspace: 0.25
    
    axes.labelsize: 14
    axes.titlesize: 16
    
    xtick.labelsize: 14
    ytick.labelsize: 14
  

  callstack_params:
    smooth_2d_params:
      zslice: [0.09]
      heatmap_params:
        contours: null
      draw_colorbar: true
      colorbar_params:
        size: [0.05, 0.9]
        position: [1.05, 0.05]
        tick_props:
          labelsize: 14

data_source:
  group:
    data_source:
    - _target_: DBSource
      network_query : |
        SELECT * from network WHERE recipe_name = "2I3Nv1_3"
        AND xp = "2024-04-09_BPv7_recombCIR"
      metadata:
        title: 3 regions dual input

figure_maker:
  _target_: SingleFigure
  plot_tasks:
    - plot_method:
        func: biocomp.plotutils.smooth
        kwargs:
          force_dim: 2
          plot_data: '${ftask: flat_data.${ptask: context.plot_task_index}}'
          ax: '${ptask: context.figure.flat_ax.${ptask: context.plot_task_index}}'
          title: null
          xtitle: '\begin{center} X\textsubscript{1} (${ftask: flat_data.${ptask: context.plot_task_index}.input_names.0}) \\ Csy4\textsubscript{RS}\_mNG + CasE\textsubscript{RS}\_mNG + pgu \end{center}'
          ytitle: '\begin{center} X\textsubscript{2} (${ftask: flat_data.${ptask: context.plot_task_index}.input_names.1}) \\ Csy4\textsubscript{RS}\_mNG + pgu\textsubscript{RS}\_mNG + CasE \end{center}'
          vtitle: 'mNeonGreen'
