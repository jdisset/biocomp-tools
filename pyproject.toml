[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "biocomptools"
version = "0.2.1"
description = "A set of tools and utils for the biocompiler."
authors = [{name = "Jean Disset", email = "jdisset@mit.edu"}]
readme = "README.md"
dependencies = [
	"biocomp",
	"ray",
	"pympler",
	"memray",
	"multiprocess",
	"sqlmodel",
	"pydantic",
	"xxhash",
	"pyarrow",
	"gitpython",
	"mlflow",
	"rich",
	"plotext",
]


[project.scripts]
biocomp-plot= "biocomptools.plot:main"
biocomp-train= "biocomptools.run_training:main"
biocomp-check = "biocomptools.test_dataset:main"

