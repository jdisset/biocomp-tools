[build-system]
requires = ["setuptools>=42", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "biocomptools"
version = "0.1.0"
description = "A set of tools and utils for the biocompiler."
authors = [{name = "Jean Disset", email = "jdisset@mit.edu"}]
readme = "README.md"
dependencies = [
	"biocomp",
	"hydra-core",
	"psycopg2-binary",

]


[project.scripts]
#biocomptools_train= "biocomp-tools:train.main"

[tool.pyright]
include = ["src"]

reportMissingImports = true
reportMissingTypeStubs = false

pythonVersion = "3.11"

venvPath = "/opt/homebrew/Caskroom/miniconda/base/envs"
venv = "py311"


[tool.setuptools]
packages = ["biocomptools"]
#package_dir = {"" = "."}
#include_package_data = true

#[tool.setuptools.package_data]
#biocomptools = ["configs/*.yaml"]
