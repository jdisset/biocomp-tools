[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "biocomptools"
version = "0.2.0"
description = "A set of tools and utils for the biocompiler."
authors = [{name = "Jean Disset", email = "jdisset@mit.edu"}]
readme = "README.md"
dependencies = [
	"biocomp",
	"hydra-core",
	"psycopg2-binary",
	"ray",
	"sqlmodel",
	"pydantic",
	"xxhash",
	"pyarrow",
	"gitpython",
	"mlflow",
	"rich",
]


[project.scripts]
biocomp-plotdata = "biocomptools.plot_data:main" # old script, keeping for now
biocomp-plot= "biocomptools.plot:main" # new plot tool
biocomp-makevideo = "biocomptools.make_video:main"
biocomp-training = "biocomptools.run_training:main"

