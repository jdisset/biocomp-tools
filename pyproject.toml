[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "biocomptools"
version = "0.1.0"
description = "A set of tools and utils for the biocompiler."
authors = [{name = "Jean Disset", email = "jdisset@mit.edu"}]
readme = "README.md"
dependencies = [
	"biocomp",
	"hydra-core",
	"psycopg2-binary",
	"ray",
	"sqlmodel",
	"pydantic"
]


[project.scripts]
biocomp-plotdata = "biocomptools.plot_data:main"
biocomp-makevideo = "biocomptools.make_video:main"

[tool.pyright]
include = ["src"]

reportMissingImports = true
reportMissingTypeStubs = false

pythonVersion = "3.11"

venvPath = "/opt/homebrew/Caskroom/miniconda/base/envs"
venv = "py311"


[tool.basedpyright]
include = ["src"]

reportMissingImports = true
reportMissingTypeStubs = false

pythonVersion = "3.11"

typeCheckingMode = "standard"

